<!DOCTYPE html>
<html>
<head>
    <title>NLP Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffe6f0, #ffffff);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 40px;
            width: 40%;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(255, 105, 180, 0.2);
        }

        h1 {
            color: #ff4da6;
            margin-bottom: 20px;
        }

        input[type="file"] {
            padding: 10px;
            margin: 15px 0;
        }

        button {
            background-color: #ff4da6;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1a8c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 NLP Text Analyzer</h1>
        <p>Upload your file to perform POS Tagging</p>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required><br>
            <button type="submit">Upload & Analyze</button>
        </form>
    </div>

</body>
</html>
